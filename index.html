    #error { color: red; margin-top: 10px; text-align: center; font-size: 14px; }

    .horizontal-line { position: absolute; top: 50%; width: 60%; height: 1px; background: #ccc; z-index: -1; }
    .no-items { color: #666; font-style: italic; padding: 20px; }
    /* Card Flip */
    .node { perspective: 1000px; width: 240px; height: 270px; cursor: pointer; border-radius: 12px;}
    .node.non-main { width: 150px; height: 210px; }
    .node.main { border: 5px solid #007bff; }
    .card-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.6s; }
    .node.flipped .card-inner { transform: rotateY(180deg); }
    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 15px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow: hidden;
    }
    .card-back {
      transform: rotateY(180deg);
      align-items: flex-start;
      font-size: 9px;
      line-height: 1;
    }
    .card-back .label-line {
      margin-bottom: 3px;
      width: 100%;
    }
    .card-back .label-title {
      color: #007bff;
      font-weight: bold;
      display: block;
    }
    .card-back .label-value {
      display: block;
      margin-top: 2px;
      word-break: break-all;
      color: #333;
    }
    .node:hover .card-front {
      box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.55), 0 0 18px rgba(255, 215, 0, 0.7), 0 4px 12px rgba(0,0,0,0.35);
      z-index: 10;
    }
    .node img, .node iframe {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .node .number { font-size: 16px; color: #007bff; margin-bottom: 8px; cursor: pointer; }
    .node .number:hover { text-decoration: underline; }
    .node .label { font-size: 12px; color: #333; margin-top: 6px; }
    .node .satoshi-text { font-size: 10px; color: #007bff; margin-top: 4px; }
    .node img { width: 180px; height: 180px; object-fit: contain; image-rendering: pixelated; background: #6f7c96; }
    .node.non-main img { width: 120px; height: 120px; }
    .node iframe { width: 180px; height: 180px; border: none; background: #6e7c96; }
    .node.non-main iframe { width: 120px; height: 120px; }
    .duck-visual { width: 180px; height: 180px; position: relative; background: #6f7c96; }
    .node.non-main .duck-visual { width: 120px; height: 120px; }
    .duck-visual img, .duck-visual iframe { position: absolute; inset: 0; width: 100%; height: 100%; }
    .duck-open { opacity: 0; pointer-events: none; }
    .duck-visual.quacking .duck-open { opacity: 1; }
    .duck-visual.quacking .duck-closed { opacity: 0; }
    .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
    .pagination button { padding: 5px 10px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
    .pagination button:hover { background: #0056b3; }
    .pagination button:disabled { background: #ccc; cursor: not-allowed; }
    .toggle-container { margin: 10px; }
    .toggle-container select { padding: 5px; font-size: 16px; border-radius: 5px; }
  </style>

<script>
    const EXCLUDED_ID = '3076dfe2994ca4b229009eaf5696ad51c4cc68159d13a73a7927a3b8638e411ai0';
    const SATOSHI_IDS = ['84defb5e7db11f047b4bc58685b65654980be4a55e254a510048a71e0e43e532i0','3f409c1e27eb0ef45b2f5c0e099cd2320f055ec9fd60c5becbb9830533fb155bi0','212957fe226d237522049fa2d3cf47337ae8bc6d2e90ca21ca4a188e2933bdb2i0','5564e0402cd25efb8339715598946bb11d62120923b98be7bc4ed73d82928bf8i0','895060f4d9347d6f07be07cf4c0b9990abe8b2fb97db750b85eee240e07de1adi0'];
    const CHILDREN_PER_PAGE = 15;
    const DEFAULT_ORDINALS_ID = '593015b9a76a11554f0a05c3b77a4723c6baaefb8bdd4175712a7320714b8ea8i0';
    const DEFAULT_FRACTALS_ID = 'a8c39053a557f72619115be77dfeb7bd8506c4d23dee7ddb86d5bc2aea421eeei0';
    let currentPage = 1;
    let allChildrenIds = [];
    let network = 'ordinals';
    const DEFAULT_META = { txid: 'N/A', inscriptionNumber: 'N/A', contentType: 'N/A', contentLength: 'N/A', genesisBlock: 'N/A', address: 'N/A' };
    const LOCAL_ORDINAL_IMAGE_MAP_URL = './assets/github-ducks/serial-map.json';

    const LOCAL_ORDINAL_GRAPH_URL = './assets/graph/ordinals-local-graph-trimmed.json';
    const LOCAL_FRACTAL_GRAPH_URL = './assets/fractal/fractal-5050-graph.json';
    const INSCRIPTIONS_META_URL = './inscriptions.json';
    let LOCAL_ORDINAL_IMAGE_MAP = null;
    let LOCAL_ORDINAL_HTML_MAP = null;
    let LOCAL_ORDINAL_GRAPH = null;
    let LOCAL_FRACTAL_GRAPH = null;
    let INSCRIPTIONS_META_MAP = null;
    async function ensureLocalMapsLoaded() {
      if (LOCAL_ORDINAL_IMAGE_MAP && LOCAL_ORDINAL_HTML_MAP && LOCAL_ORDINAL_GRAPH && LOCAL_FRACTAL_GRAPH && INSCRIPTIONS_META_MAP) return;
      try {
        const [imgRes, htmlRes, graphRes, fractalGraphRes, inscriptionsRes] = await Promise.all([
          fetch(LOCAL_ORDINAL_IMAGE_MAP_URL),
          fetch(LOCAL_ORDINAL_HTML_MAP_URL),
          fetch(LOCAL_ORDINAL_GRAPH_URL),
          fetch(LOCAL_FRACTAL_GRAPH_URL),
          fetch(INSCRIPTIONS_META_URL)
        ]);
        LOCAL_ORDINAL_IMAGE_MAP = imgRes.ok ? await imgRes.json() : {};
        LOCAL_ORDINAL_HTML_MAP = htmlRes.ok ? await htmlRes.json() : {};
        LOCAL_ORDINAL_GRAPH = graphRes.ok ? await graphRes.json() : { nodes: {}, collections: {} };
        LOCAL_FRACTAL_GRAPH = fractalGraphRes.ok ? await fractalGraphRes.json() : { nodes: {} };
        const inscriptionsList = inscriptionsRes.ok ? await inscriptionsRes.json() : [];
        INSCRIPTIONS_META_MAP = Object.fromEntries((inscriptionsList || []).map(item => [item.id, item.meta || {}]));
      } catch {
        LOCAL_ORDINAL_IMAGE_MAP = {};
        LOCAL_ORDINAL_HTML_MAP = {};
        LOCAL_ORDINAL_GRAPH = { nodes: {}, collections: {} };
        LOCAL_FRACTAL_GRAPH = { nodes: {} };
        INSCRIPTIONS_META_MAP = {};
      }
    }
    const FORCE_IMAGE_IDS = new Set([
      '84defb5e7db11f047b4bc58685b65654980be4a55e254a510048a71e0e43e532i0',
      '19f504c44f0388c738ca92796b940617e60eb6239f27433b2e4c136191090954i0',
      'a1066105531b7cc234085e83c352e08405e147fc468f072762a13dc87204ac2di0',
      'f5fb1f3b1d35a8fef29c12755a05b33ca9713a20e289b1219554842c56860974i0'
    ]);
    const FIXED_LOCAL_IMAGE_OVERRIDES = {
      'a1066105531b7cc234085e83c352e08405e147fc468f072762a13dc87204ac2di0': './assets/github-ducks/fixed-html/a1066105531b7cc234085e83c352e08405e147fc468f072762a13dc87204ac2di0.html',
      'f5fb1f3b1d35a8fef29c12755a05b33ca9713a20e289b1219554842c56860974i0': './assets/github-ducks/fixed-html/f5fb1f3b1d35a8fef29c12755a05b33ca9713a20e289b1219554842c56860974i0.html'
    };
    function resolveLocalOrdinalsContent(id) {
      const img = LOCAL_ORDINAL_IMAGE_MAP?.[id];
      const html = LOCAL_ORDINAL_HTML_MAP?.[id];
      if (FORCE_IMAGE_IDS.has(id)) {
        if (FIXED_LOCAL_IMAGE_OVERRIDES[id]) {
          return { content: FIXED_LOCAL_IMAGE_OVERRIDES[id], isImage: false, isHtml: true, source: 'fixed-local-html' };
        }
        return { content: `https://ordinals.com/preview/${id}`, isImage: true, isHtml: false, source: 'forced-preview-image' };
      }
      if (html?.file) return { content: `./assets/github-ducks/domoducks-256-html/${html.file}`, isImage: false, isHtml: true, source: 'local-html' };
      if (img?.file) return { content: `./assets/github-ducks/serial-ducks-2560/${img.file}`, isImage: true, isHtml: false, source: 'local-image' };
      return null;
    }
    function getActiveGraph() {
      return network === 'fractals' ? LOCAL_FRACTAL_GRAPH : LOCAL_ORDINAL_GRAPH;
    }
    function getParentsFromLocalGraph(id) {
      const activeGraph = getActiveGraph();
      if (!activeGraph?.nodes) return [];
      const node = activeGraph.nodes[id];
      if (Array.isArray(node?.parents) && node.parents.length) return node.parents;
      const parents = [];
      for (const [pid, pnode] of Object.entries(activeGraph.nodes)) {
        if (Array.isArray(pnode?.children) && pnode.children.includes(id)) parents.push(pid);
      }
      return parents;
    }
    function findLineagePathToRoot(startId, rootId) {
      const seen = new Set();
      function dfs(currentId, path) {
        if (currentId === rootId) return path;
        if (seen.has(currentId)) return null;
        seen.add(currentId);
        const parents = getParentsFromLocalGraph(currentId) || [];
        for (const p of parents) {
          const found = dfs(p, [...path, p]);
          if (found) return found;
        }
        return null;
      }
      return dfs(startId, []);
    }
    function validateInscriptionId(id) {
      return /^[0-9a-fA-F]{64}i\d+$/.test(id);
    }
    function truncate(str, length = 20) {
      if (typeof str !== 'string' || str === 'N/A') return 'N/A';
      return str.length > length ? str.slice(0, length) + '...' : str;
    }
    async function fetchInscriptionData(id, depth = 0, visited = new Set()) {
      await ensureLocalMapsLoaded();
      if (id === EXCLUDED_ID) return null;
      if (visited.has(id)) {
        return { id, content: 'https://placehold.co/150x150?text=Self-Ref', isImage: true, isHtml: false, number: 'N/A', meta: { ...DEFAULT_META }, parents: [], grandparents: [], greatGrandparents: [], children: [] };
      }
      visited.add(id);
      if (!validateInscriptionId(id)) {
        return { id, content: 'https://placehold.co/150x150?text=Invalid+ID', isImage: true, isHtml: false, number: 'N/A', meta: { ...DEFAULT_META }, parents: [], grandparents: [], greatGrandparents: [], children: [] };
      }
      const isFractal = network === 'fractals';
      const baseUrl = isFractal ? 'https://ordinals.fractalbitcoin.io' : 'https://ordinals.com';
      const graphNode = isFractal ? LOCAL_FRACTAL_GRAPH?.nodes?.[id] : LOCAL_ORDINAL_GRAPH?.nodes?.[id];
      const previewBaseUrl = isFractal ? 'https://fractal-static.unisat.io/preview' : 'https://ordinals.com/preview';
      const contentBaseUrl = isFractal ? 'https://ordinals.fractalbitcoin.io/content' : 'https://ordinals.com/content';
      const inscriptionUrl = isFractal ? `https://open-api-fractal.unisat.io/v1/indexer/inscription/info/${id}` : `https://ordinals.com/r/inscription/${id}`;
      let content = `${previewBaseUrl}/${id}`;
      let isImage = true;
      let isHtml = false;
      const localOverride = network === 'ordinals' ? resolveLocalOrdinalsContent(id) : null;
      if (localOverride) {
        content = localOverride.content;
        isImage = localOverride.isImage;
        isHtml = localOverride.isHtml;
      }
      let number = 'N/A';
      const meta = { ...DEFAULT_META };

      if (graphNode) {
        meta.txid = graphNode.txid || 'N/A';
        meta.inscriptionNumber = graphNode.number ?? 'N/A';
        meta.contentType = graphNode.contentType || 'N/A';
        meta.contentLength = graphNode.contentLength || 'N/A';
        meta.genesisBlock = graphNode.genesisBlock ?? 'N/A';
        meta.address = graphNode.address || 'N/A';
        number = graphNode.number ?? 'N/A';

        if (graphNode.local?.path) {
          content = graphNode.local.path;
          isImage = graphNode.local.type === 'image-content';
          isHtml = !isImage;
        }

        const filteredParents = getParentsFromLocalGraph(id).filter(p => p !== EXCLUDED_ID);
        const children = Array.isArray(graphNode.children) ? graphNode.children : [];

        let grandparents = [];
        if (filteredParents.length > 0) {
          const gpIds = [...new Set(filteredParents.flatMap(p => getParentsFromLocalGraph(p)))].filter(gp => gp !== EXCLUDED_ID);
          grandparents = gpIds.map(gp => {
            const activeGraph = getActiveGraph();
            const gpNode = activeGraph?.nodes?.[gp] || {};
            const local = isFractal ? gpNode.local : (gpNode.local || resolveLocalOrdinalsContent(gp));
            return {
              id: gp,
              content: local?.path || `${baseUrl}/content/${gp}`,
              isImage: local ? local.type === 'image-content' : true,
              isHtml: local ? local.type !== 'image-content' : false,
              number: gpNode.number ?? 'N/A',
              meta: {
                txid: gpNode.txid || 'N/A',
                inscriptionNumber: gpNode.number ?? 'N/A',
                contentType: gpNode.contentType || 'N/A',
                contentLength: gpNode.contentLength || 'N/A',
                genesisBlock: gpNode.genesisBlock ?? 'N/A',
                address: gpNode.address || 'N/A'
              }
            };
          });
        }

        return { id, content, isImage, isHtml, number, meta, parents: filteredParents, grandparents, greatGrandparents: [], children };
      }
      try {
        const inscriptionResponse = await fetch(inscriptionUrl);
        if (inscriptionResponse.ok) {
          const json = await inscriptionResponse.json();
          if (isFractal) {
            meta.txid = json.data?.inscriptionId || 'N/A';
            meta.inscriptionNumber = json.data?.inscriptionNumber ?? 'N/A';
            meta.contentType = json.data?.contentType || 'N/A';
            meta.contentLength = json.data?.contentLength || 'N/A';
            meta.genesisBlock = json.data?.height || 'N/A';
            meta.address = json.data?.address || 'N/A';
            number = json.data?.inscriptionNumber ?? 'N/A';
          } else {
            meta.txid = json.id || 'N/A';
            meta.inscriptionNumber = json.number ?? 'N/A';
            meta.contentType = json.content_type || 'N/A';
            meta.contentLength = json.content_length || 'N/A';
            meta.genesisBlock = json.height ?? 'N/A';
            meta.address = json.address || 'N/A';
            number = json.number ?? 'N/A';
          }
        }
        try {
          if (!localOverride) {
            const head = await fetch(content, { method: 'HEAD' });
            const type = head.headers.get('content-type') || '';
            if (head.status >= 400 || !type.startsWith('image/')) {
              content = `${contentBaseUrl}/${id}`;
              const head2 = await fetch(content, { method: 'HEAD' });
              const type2 = head2.headers.get('content-type') || '';
              if (!type2.startsWith('image/')) { isImage = false; isHtml = true; }
            }
          }
        } catch { if (!localOverride) content = 'https://placehold.co/150x150?text=Error'; }
        const [parentsRes, childrenRes] = await Promise.all([
          fetch(`${baseUrl}/r/parents/${id}`).catch(() => ({ ok: false })),
          depth === 0 ? fetch(`${baseUrl}/r/children/${id}`).catch(() => ({ ok: false })) : { ok: false }
        ]);
        const parentsData = parentsRes.ok ? await parentsRes.json() : { ids: [] };
        const childrenData = depth === 0 && childrenRes.ok ? await childrenRes.json() : { ids: [] };
        const filteredParents = (parentsData.ids || []).filter(p => p !== EXCLUDED_ID);
        const filteredChildren = (childrenData.ids || []).filter(c => c !== EXCLUDED_ID);
        let grandparents = [], greatGrandparents = [];
        if (depth < 1 && filteredParents.length > 0) {
          const gpMap = new Map();
          for (const p of filteredParents) {
            const pData = await fetchInscriptionData(p, depth + 1, visited);
            if (pData) {
              for (const gp of pData.parents) {
                if (!gpMap.has(gp)) {
                  const ggData = await fetchInscriptionData(gp, depth + 2, visited);
                  if (ggData) {
                    gpMap.set(gp, ggData);
                  }
                }
              }
            }
          }
          grandparents = Array.from(gpMap.values());
        }
        return { id, content, isImage, isHtml, number, meta, parents: filteredParents, grandparents, greatGrandparents, children: filteredChildren };
      } catch (err) {
        console.error('Fetch error for', id, err);
        return { id, content: 'https://placehold.co/150x150?text=Error', isImage: true, isHtml: false, number: 'N/A', meta: { ...DEFAULT_META }, parents: [], grandparents: [], greatGrandparents: [], children: [] };
      }
    }
    function getInscriptionTrait(id, traitName) {
      const attrs = INSCRIPTIONS_META_MAP?.[id]?.attributes;
      if (!Array.isArray(attrs)) return 'N/A';
      const found = attrs.find(a => (a?.trait_type || '').toUpperCase() === traitName.toUpperCase());
      return found?.value || 'N/A';
    }
    function createNode(id, content, isHtml, isImage, levelType, index, number, meta = { ...DEFAULT_META }) {
      if (id === EXCLUDED_ID) return null;
      const node = document.createElement('div');
      node.className = `node ${levelType === 'main' ? 'main' : 'non-main'}`;
      node.dataset.id = id;
      const label = levelType === 'great-grandparent' ? `Great-Grandparent #${index + 1}` :
                    levelType === 'grandparent' ? `Grandparent #${index + 1}` :
                    levelType === 'parent' ? `Parent #${index + 1}` :
                    levelType === 'main' ? 'Main Inscription' : `Child #${index + 1}`;
      const satoshiText = SATOSHI_IDS.includes(id) ? '<div class="satoshi-text">(Sent to Satoshi)</div>' : '';
      const forceImgZoom = FORCE_IMAGE_IDS.has(id);
      const imgStyle = forceImgZoom ? 'style="object-fit: contain; object-position: center; image-rendering: pixelated;"' : '';
      const isCollection256 = network === 'ordinals' && !!INSCRIPTIONS_META_MAP?.[id];
      const rawDuckName = isCollection256 ? (INSCRIPTIONS_META_MAP[id]?.name || '') : '';
      const duckName = rawDuckName === 'Logo' ? '' : rawDuckName;
      const duckSex = isCollection256 ? getInscriptionTrait(id, 'SEX') : 'N/A';
      const duckBreed = isCollection256 ? getInscriptionTrait(id, 'BREED') : 'N/A';
      const quackHtml = (network === 'ordinals' && LOCAL_ORDINAL_HTML_MAP?.[id]?.file)
        ? resolveLocalOrdinalsContent(id)?.content
        : null;
      const quackEnabled = !!quackHtml;
      const display = quackEnabled
        ? `<div class="duck-visual" data-quack-enabled="1">
             <iframe src="${quackHtml}" sandbox="allow-scripts allow-same-origin"></iframe>
           </div>`
        : (isImage
          ? `<img src="${content}" ${imgStyle} onerror="this.src='https://placehold.co/150x150?text=Error';" alt="Inscription">`
          : `<iframe src="${content}" sandbox="allow-scripts allow-same-origin"></iframe>`);
      const sizeText = meta.contentLength !== 'N/A' ? `${meta.contentLength} bytes` : 'N/A';
      node.innerHTML = `
        <div class="card-inner">
          <div class="card-front">
            <div class="number" onclick="buildTree('${id}')">#${number}</div>
            ${display}
            <div class="label">${label}</div>
            ${duckName ? `<div class="satoshi-text">${duckName}</div>` : ''}
            ${satoshiText}
          </div>
          <div class="card-back">
            <div class="label-line"><span class="label-title">Tx ID:</span><span class="label-value">${truncate(meta.txid, 100)}</span></div>
            <div class="label-line"><span class="label-title">Inscription #:</span><span class="label-value">${meta.inscriptionNumber}</span></div>
            <div class="label-line"><span class="label-title">File Type:</span><span class="label-value">${meta.contentType}</span></div>
            <div class="label-line"><span class="label-title">File Size:</span><span class="label-value">${sizeText}</span></div>
            <div class="label-line"><span class="label-title">Creation Block:</span><span class="label-value">${meta.genesisBlock}</span></div>
            ${isCollection256 ? `<div class="label-line"><span class="label-title">Sex:</span><span class="label-value">${duckSex}</span></div>` : ''}
            ${isCollection256 ? `<div class="label-line"><span class="label-title">Breed:</span><span class="label-value">${duckBreed}</span></div>` : ''}
          </div>
        </div>
      `;
      node.addEventListener('click', (e) => {
        if (e.target.closest('.number')) return;
        e.stopPropagation();

        const isFlipped = node.classList.contains('flipped');
        const clickedBack = !!e.target.closest('.card-back');
        const clickedVisual = !!e.target.closest('img, iframe, .duck-visual');

        if (isFlipped) {
          if (clickedBack) node.classList.remove('flipped');
          return;
        }

        if (clickedVisual) {
          const quackVisual = node.querySelector('.duck-visual[data-quack-enabled="1"]');
          if (quackVisual) {
            playQuack();
          }
          return;
        }

        node.classList.add('flipped');
      });
      return node;
    }

    function playQuack() {
      const audio = document.getElementById('duckSound');
      if (!audio) return;
      audio.currentTime = 0;
      audio.play().catch(() => {});
    }
    function renderPagination(total) {
      const div = document.createElement('div');
      div.className = 'pagination';
      div.innerHTML = `
        <button ${currentPage === 1 ? 'disabled' : ''} onclick="currentPage--; renderChildrenLevel()">Previous</button>
        <span>Page ${currentPage} of ${Math.ceil(total / CHILDREN_PER_PAGE)}</span>
        <button ${currentPage >= Math.ceil(total / CHILDREN_PER_PAGE) ? 'disabled' : ''} onclick="currentPage++; renderChildrenLevel()">Next</button>
      `;
      return div;
    }
    async function renderChildrenLevel() {
      const level = document.getElementById('children-level');
      if (!level) return;
      level.innerHTML = allChildrenIds.length > 1 ? '<div class="horizontal-line"></div>' : '';
      const start = (currentPage - 1) * CHILDREN_PER_PAGE;
      const end = Math.min(start + CHILDREN_PER_PAGE, allChildrenIds.length);
      if (allChildrenIds.length === 0) {
        level.innerHTML += '<div class="no-items">No Children</div>';
        return;
      }
      for (let i = start; i < end; i++) {
        const childData = await fetchInscriptionData(allChildrenIds[i], 1);
        if (childData) {
          const node = createNode(childData.id, childData.content, childData.isHtml, childData.isImage, 'child', i, childData.number, childData.meta);
          if (node) level.appendChild(node);
        }
      }
      const oldPag = document.getElementById('pagination');
      if (oldPag) oldPag.remove();
      if (allChildrenIds.length > CHILDREN_PER_PAGE) {
        const pag = renderPagination(allChildrenIds.length);
        pag.id = 'pagination';
        level.parentNode.appendChild(pag);
      }
    }
    async function buildTree(inscriptionId) {
      const tree = document.getElementById('tree');
      const errorDiv = document.getElementById('error');
      const loadingDiv = document.getElementById('loading');
      tree.innerHTML = '<div class="vertical-line"></div>';
      errorDiv.textContent = '';
      loadingDiv.style.display = 'block';
      currentPage = 1;
      allChildrenIds = [];
      let mainData = null;
      try {
        mainData = await fetchInscriptionData(inscriptionId);
        if (!mainData) {
          throw new Error('This inscription is excluded or could not be loaded.');
        }
      } catch (err) {
        errorDiv.textContent = 'Error loading main inscription: ' + (err.message || 'Unknown error');
        loadingDiv.style.display = 'none';
        return;
      }
      try {
        const isStartRoot = (network === 'ordinals' && inscriptionId === DEFAULT_ORDINALS_ID)
          || (network === 'fractals' && inscriptionId === DEFAULT_FRACTALS_ID);

        let renderedLineage = false;
        if (network === 'ordinals' && !isStartRoot) {
          const lineage = findLineagePathToRoot(inscriptionId, DEFAULT_ORDINALS_ID);
          if (Array.isArray(lineage) && lineage.length) {
            const topDown = lineage.slice().reverse();
            for (let i = 0; i < topDown.length; i++) {
              const ancestorId = topDown[i];
              const ancestorData = await fetchInscriptionData(ancestorId, 1);
              if (!ancestorData) continue;
              const level = document.createElement('div');
              level.className = 'level';
              const levelType = i === 0 ? 'great-grandparent' : 'parent';
              const node = createNode(ancestorId, ancestorData.content, ancestorData.isHtml, ancestorData.isImage, levelType, 0, ancestorData.number, ancestorData.meta);
              if (node) {
                const labelEl = node.querySelector('.label');
                if (labelEl) {
                  if (i === 0) labelEl.textContent = 'Root #256';
                  else if (i === 1) labelEl.textContent = 'Great-Grandparent';
                  else if (i === 2) labelEl.textContent = 'Grandparent';
                  else labelEl.textContent = `Ancestor #${i}`;
                }
                level.appendChild(node);
                tree.appendChild(level);
              }
            }
            renderedLineage = true;
          }
        }

        if (!renderedLineage && !isStartRoot) {
          ['greatGrandparents', 'grandparents'].forEach(type => {
            const items = mainData[type] || [];
            if (!items.length) return;
            const level = document.createElement('div');
            level.className = 'level';
            if (items.length > 1) level.innerHTML = '<div class="horizontal-line"></div>';
            items.forEach((item, i) => {
              const levelName = type === 'greatGrandparents' ? 'great-grandparent' : 'grandparent';
              const node = createNode(item.id, item.content, item.isHtml, item.isImage, levelName, i, item.number, item.meta);
              if (node) level.appendChild(node);
            });
            tree.appendChild(level);
          });
        }

        if (!isStartRoot && mainData.parents.length > 1) {
          const parentLevel = document.createElement('div');
          parentLevel.className = 'level';
          parentLevel.innerHTML = '<div class="horizontal-line"></div>';
          for (let i = 0; i < mainData.parents.length; i++) {
            const parentId = mainData.parents[i];
            try {
              const parentData = await fetchInscriptionData(parentId, 1);
              if (parentData) {
                const node = createNode(parentId, parentData.content, parentData.isHtml, parentData.isImage, 'parent', i, parentData.number, parentData.meta);
                if (node) parentLevel.appendChild(node);
              }
            } catch (e) {
              console.warn('Failed to load parent', parentId);
            }
          }
          tree.appendChild(parentLevel);
        } else if (!renderedLineage && !isStartRoot) {
          const parentLevel = document.createElement('div');
          parentLevel.className = 'level';
          if (mainData.parents.length === 1) {
            try {
              const parentData = await fetchInscriptionData(mainData.parents[0], 1);
              if (parentData) {
                const node = createNode(mainData.parents[0], parentData.content, parentData.isHtml, parentData.isImage, 'parent', 0, parentData.number, parentData.meta);
                if (node) parentLevel.appendChild(node);
              }
            } catch (e) {
              console.warn('Failed to load parent', mainData.parents[0]);
            }
          } else {
            parentLevel.innerHTML = '<div class="no-items">No Parents</div>';
          }
          tree.appendChild(parentLevel);
        }
        const mainLevel = document.createElement('div');
        mainLevel.className = 'level';
        const mainNode = createNode(inscriptionId, mainData.content, mainData.isHtml, mainData.isImage, 'main', 0, mainData.number, mainData.meta);
        if (mainNode) mainLevel.appendChild(mainNode);
        tree.appendChild(mainLevel);
        const childrenLevel = document.createElement('div');
        childrenLevel.className = 'level children';
        childrenLevel.id = 'children-level';
        if (mainData.children.length > 1) childrenLevel.innerHTML = '<div class="horizontal-line"></div>';
        tree.appendChild(childrenLevel);
        allChildrenIds = mainData.children;
        await renderChildrenLevel();
      } catch (err) {
        console.error('Error rendering tree:', err);
        errorDiv.textContent = 'Partial load: Some related inscriptions failed.';
      } finally {
        loadingDiv.style.display = 'none';
      }
    }
    document.getElementById('fetch-btn').onclick = () => {
      const id = document.getElementById('inscription-id').value.trim();
      if (id) buildTree(id);
    };
    document.getElementById('reset-btn').onclick = () => {
      const defaultId = network === 'fractals' ? DEFAULT_FRACTALS_ID : DEFAULT_ORDINALS_ID;
      document.getElementById('inscription-id').value = defaultId;
      buildTree(defaultId);
    };
    document.getElementById('network-toggle').onchange = (e) => {
      network = e.target.value;
      const defaultId = network === 'fractals' ? DEFAULT_FRACTALS_ID : DEFAULT_ORDINALS_ID;
      document.getElementById('inscription-id').value = defaultId;
      buildTree(defaultId);
    };
    window.onload = () => buildTree(document.getElementById('inscription-id').value.trim());
  </script>
</body>
