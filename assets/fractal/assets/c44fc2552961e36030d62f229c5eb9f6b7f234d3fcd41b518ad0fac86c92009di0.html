        let recursiveInscriptions = [

            "https://ordinals.fractalbitcoin.io/content/6dc21d99664c5d8794305a71b8f4f28ae1fa8975f298764c57f3d9f9626fa609i0",
            "https://ordinals.fractalbitcoin.io/content/321a93ec296df6a91a8756ebb10d448ee5f0e55a3ba2d835655e07acef4a4a39i0",
            "https://ordinals.fractalbitcoin.io/content/ee2fd64d0fff90e586e88a410c9978dc5ec341a895ea1dc69d5972e97ab73bffi0",
            "https://ordinals.fractalbitcoin.io/content/f7fb57a51c7396a34c228dfecaf39090dc2c6d75a884bee3cfc7dcc6d445a2abi0"
        ];
        let loadedImages = new Set();
        let failedImages = new Set();
        let swappingStarted = false;
        let hasStartedOnce = false;
        const loadPromises = recursiveInscriptions.map(recursion => {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    loadedImages.add(recursion);
                    resolve(recursion);
                };
                img.onerror = () => {
                    failedImages.add(recursion);
                    reject(recursion);
                };
                img.src = recursion;
            });
        });
        Promise.allSettled(loadPromises).then(() => {
            if (loadedImages.size > 0) {
                hasStartedOnce = true;
                swappingStarted = true;
                swapImage();
            }
        });
        function swapImage() {
            if (loadedImages.size === 0) {
                swappingStarted = false;
                return;
            }
            const currentActive = document.querySelector('img.active');
            const hiddenImg = currentActive === img1 ? img2 : img1;
            const imagesArray = Array.from(loadedImages);
            const index = Math.floor(Math.random() * imagesArray.length);
            const currentRecursion = imagesArray[index];
            hiddenImg.onload = function() {
                currentActive.classList.remove('active');
                hiddenImg.classList.add('active');
                const delay = 70 + Math.random() * 60;
                setTimeout(swapImage, delay);
            };
            hiddenImg.onerror = function() {
                loadedImages.delete(currentRecursion);
                failedImages.add(currentRecursion);
                swapImage();
            };
            hiddenImg.src = currentRecursion;
        }
        function checkFailedImages() {
            failedImages.forEach(recursion => {
                const img = new Image();
                img.onload = () => {
                    failedImages.delete(recursion);
                    loadedImages.add(recursion);
                    if (!swappingStarted) {
                        if (hasStartedOnce && loadedImages.size > 0) {
                            swappingStarted = true;
                            swapImage();
                        } else if (!hasStartedOnce && loadedImages.size === recursiveInscriptions.length) {
                            hasStartedOnce = true;
                            swappingStarted = true;
                            swapImage();
                        }
                    }
                };
                img.onerror = () => {};
                img.src = recursion;
            });
        }
        setInterval(checkFailedImages, 5000);
